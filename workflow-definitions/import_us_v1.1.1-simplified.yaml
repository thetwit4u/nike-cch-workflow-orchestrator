schema_version: "1.1.2"
workflow_name: "Simplified Import US Workflow"
workflow_id: "import_us_v1_simplified"
entry_point: Create_Filing_Packs

initial_context:
  - deliverySetId
  - deliverySetURI

nodes:
  Create_Filing_Packs:
    type: async_request
    title: "Create Filing Packs with Enrichment"
    capability_id: "import#create_filingpacks"
    input_keys:
      - "deliverySetId"
      - "deliverySetURI"
    request_output_keys:
      - "deliverySetImportEnrichedId"
      - "deliverySetImportEnrichedURI"
      - "deliverySetImportEnrichedStatus"
      - "deliverySetImportEnrichedError"
      - "filingPacksStatus"
      - "filingPacksError"
      - "importFilingPacks"
    on_response: End_Workflow
    on_failure: Handle_Error

  Handle_Error:
    type: log_error
    title: "Generic Error Handler"
    default_error_code: "GEN-001"
    message_from_context_key: "_internalError"
    default_message: "A general error occurred in the workflow."
    on_success: End_Workflow

  End_Workflow:
    type: end
    title: "End Workflow"